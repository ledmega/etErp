# =============================================
# Jasypt 암호화 설정 (루트 레벨 필수)
# =============================================
jasypt:
  encryptor:
    password: ${JASYPT_ENCRYPTOR_PASSWORD:eterp_secret_key} # 기본값 제공

spring:

  # =============================================

  # =============================================
  # R2DBC 설정 (Reactive 논블로킹 DB 연결)
  # JPA 대신 사용 - 블로킹 없이 MariaDB 접근
  # =============================================
  r2dbc:
    url: r2dbc:mariadb://218.237.70.67:33306/eterp
    username: ENC(C0Dlcg4be6MxUgRVeOY86A==)
    password: ENC(IYkmRRo1XsQM0PJa8Jc9s8/QZFiXuQWD)
    pool:
      initial-size: 5       # 초기 커넥션 수
      max-size: 20          # 최대 커넥션 수
      max-idle-time: 30m    # 유휴 커넥션 최대 유지 시간
      validation-query: SELECT 1  # 커넥션 유효성 검사 쿼리

  # =============================================
  # Flyway 설정 (DB 스키마 마이그레이션)
  # ※ Flyway는 블로킹 JDBC를 사용하므로 별도 JDBC 설정 필요
  # =============================================
  flyway:
    enabled: true
    url: jdbc:mariadb://218.237.70.67:33306/eterp?characterEncoding=UTF-8&serverTimezone=Asia/Seoul
    user: ENC(C0Dlcg4be6MxUgRVeOY86A==)
    password: ENC(IYkmRRo1XsQM0PJa8Jc9s8/QZFiXuQWD)
    locations: classpath:db/migration  # 마이그레이션 SQL 파일 위치
    baseline-on-migrate: true          # 기존 DB가 있을 때 기준선 설정
    encoding: UTF-8


  # =============================================
  # Thymeleaf 개발 설정
  # =============================================
  thymeleaf:
    cache: false  # 개발 환경: 템플릿 캐시 비활성화 (수정 즉시 반영)

  # =============================================
  # Redis 설정 (캐시/세션)
  # =============================================
  data:
    redis:
      host: localhost
      port: 6379
      # password:         # 로컬 개발용 Redis는 비밀번호 없이 사용
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 1

# =============================================
# 로그 설정 (개발 환경 - 상세 로그 출력)
# =============================================
logging:
  level:
    com.et.erp: DEBUG                                # 우리 코드 DEBUG 레벨
    org.springframework.r2dbc: DEBUG                 # R2DBC 쿼리 로그
    org.springframework.security: DEBUG              # Security 처리 로그
    io.r2dbc.mariadb: DEBUG                         # MariaDB R2DBC 드라이버 로그
    org.springframework.web.reactive: DEBUG          # WebFlux 요청 처리 로그
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# =============================================
# Swagger UI (개발 환경에서만 활성화)
# =============================================
springdoc:
  swagger-ui:
    enabled: true
  api-docs:
    enabled: true
