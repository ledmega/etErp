<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>etERP - 가입 신청</title>
    <!-- Use the new auth CSS -->
    <link rel="stylesheet" th:href="@{/css/auth.css}">
</head>
<body>

<div class="auth-container">
    <div class="auth-header">
        <h1 class="auth-logo">가입 신청</h1>
        <p class="auth-subtitle">관리자 승인 후 즉시 모든 기능을 사용할 수 있습니다.</p>
    </div>

    <!-- Signup Form -->
    <form id="signupForm" action="/api/v1/auth/signup" method="post" onsubmit="handleSignup(event)">
        <div class="form-group">
            <label class="form-label">희망 그룹사 아이디</label>
            <input type="text" id="loginId" name="loginId" class="form-input" placeholder="영문, 숫자 조합" required>
        </div>

        <div class="form-group">
            <label class="form-label">이름(실명)</label>
            <input type="text" id="userName" name="userName" class="form-input" placeholder="홍길동" required>
        </div>

        <div class="form-group">
            <label class="form-label">개인 인증 이메일</label>
            <input type="email" id="email" name="email" class="form-input" placeholder="email@example.com" required>
        </div>
        
        <div class="form-group">
            <label class="form-label">비밀번호</label>
            <input type="password" id="password" name="password" class="form-input" placeholder="8자리 이상 영문자, 숫자 조합" required>
        </div>

        <div class="error-msg" id="signupError">회원가입 중 오류가 발생했습니다.</div>

        <button type="submit" class="btn-primary" id="signupBtn">승인 요청하기</button>
    </form>

    <div class="auth-footer">
        <p>이미 계정이 있으신가요? <a th:href="@{/login}" class="auth-link">로그인 하러가기</a></p>
    </div>
</div>

<script>
    async function handleSignup(e) {
        e.preventDefault();
        
        const signupBtn = document.getElementById('signupBtn');
        const errorMsg = document.getElementById('signupError');
        
        const loginId = document.getElementById('loginId').value;
        const userName = document.getElementById('userName').value;
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;

        // Reset state
        errorMsg.style.display = 'none';
        signupBtn.innerHTML = '<span class="spinner"></span> 처리중...';
        signupBtn.disabled = true;

        try {
            const response = await fetch('/api/v1/auth/signup', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ loginId, userName, email, password, phone: '010-0000-0000' }) // 임시 번호
            });

            const result = await response.json();

            if (result.success) {
                alert("가입 신청이 완료되었습니다. 관리자 승인 후 이용 가능합니다!");
                window.location.href = '/login';
            } else {
                errorMsg.innerText = result.message || '가입에 실패했습니다.';
                errorMsg.style.display = 'block';
                signupBtn.innerHTML = '승인 요청하기';
                signupBtn.disabled = false;
            }
        } catch (error) {
            errorMsg.innerText = '서버 통신 중 오류가 발생했습니다.';
            errorMsg.style.display = 'block';
            signupBtn.innerHTML = '승인 요청하기';
            signupBtn.disabled = false;
        }
    }
</script>

</body>
</html>
